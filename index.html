    <script src="https://cdnjs.snrat.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const sources = [
            "https://bitbucket.org/xiu2/yuedu/raw/master/shuyuan",
            "https://jsd.onmicrosoft.cn/gh/XIU2/Yuedu/shuyuan",
            "https://cdn.jsdmirror.com/gh/XIU2/Yuedu/shuyuan",
            "https://wget.la/https://raw.githubusercontent.com/XIU2/Yuedu/master/shuyuan",
            "https://ghfast.top/https://raw.githubusercontent.com/XIU2/Yuedu/master/shuyuan",
            "https://gh.catmak.name/https://raw.githubusercontent.com/XIU2/Yuedu/master/shuyuan",
            "https://cdn.gh-proxy.org/https://raw.githubusercontent.com/XIU2/Yuedu/master/shuyuan"
        ];

        const selectedUrl = sources[Math.floor(Math.random() * sources.length)];
        const elements = {
            sourceUrlLink: document.getElementById("source-url-link"),
            sourceUrlInput: document.getElementById("source-url-input"),
            qrCode: document.getElementById("qr-code"),
            qrOverlayLink: document.getElementById("qr-overlay-link"),
            copyButton: document.getElementById("copy-button")
        };

        elements.sourceUrlLink.href = selectedUrl;
        elements.sourceUrlInput.title = selectedUrl;
        elements.sourceUrlInput.value = selectedUrl;

        new QRCode(elements.qrCode, {
            text: selectedUrl,
            width: 320,
            height: 320,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.L
        });

        async function copyText() {
            const text = elements.sourceUrlInput.value;
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    elements.sourceUrlInput.select();
                    document.execCommand("copy");
                }
                elements.copyButton.textContent = "已复制";
                elements.copyButton.style.background = "linear-gradient(65deg, #49dff0 0, #12aced 100%)";
            } catch (error) {
                elements.copyButton.textContent = "复制失败";
                elements.copyButton.style.background = "linear-gradient(65deg, #ff9b93 0, #ff2c2c 100%)";
            }
        }

        elements.copyButton.addEventListener("click", copyText);
        elements.sourceUrlInput.addEventListener("click", copyText);
        elements.qrOverlayLink.addEventListener("click", function (event) {
            setTimeout(function () {
                window.location.href = "/readme.html";
            }, 100);
        });
    </script>
